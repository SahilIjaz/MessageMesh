version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: messagemesh-postgres
    environment:
      POSTGRES_USER: messagemesh
      POSTGRES_PASSWORD: messagemesh
      POSTGRES_DB: messagemesh
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U messagemesh"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: messagemesh-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: messagemesh-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: messagemesh-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  # Auth Service
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: messagemesh-auth
    environment:
      PORT: 3001
      NODE_ENV: development
      DEBUG: 1
      DATABASE_URL: postgresql://messagemesh:messagemesh@postgres:5432/messagemesh
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REDIS_URL: redis://redis:6379
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./services/auth-service/src:/app/src

  # User Service
  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: messagemesh-user
    environment:
      PORT: 3002
      NODE_ENV: development
      DEBUG: 1
      DATABASE_URL: postgresql://messagemesh:messagemesh@postgres:5432/messagemesh
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REDIS_URL: redis://redis:6379
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./services/user-service/src:/app/src

  # Message Service
  message-service:
    build:
      context: .
      dockerfile: services/message-service/Dockerfile
    container_name: messagemesh-message
    environment:
      PORT: 3003
      NODE_ENV: development
      DEBUG: 1
      DATABASE_URL: postgresql://messagemesh:messagemesh@postgres:5432/messagemesh
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REDIS_URL: redis://redis:6379
    ports:
      - "3003:3003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./services/message-service/src:/app/src

  # Presence Service
  presence-service:
    build:
      context: .
      dockerfile: services/presence-service/Dockerfile
    container_name: messagemesh-presence
    environment:
      PORT: 3004
      NODE_ENV: development
      DEBUG: 1
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret
    ports:
      - "3004:3004"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./services/presence-service/src:/app/src

  # Group Chat Service
  group-chat-service:
    build:
      context: .
      dockerfile: services/group-chat-service/Dockerfile
    container_name: messagemesh-group-chat
    environment:
      PORT: 3007
      NODE_ENV: development
      DEBUG: 1
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: messagemesh
      DATABASE_PASSWORD: messagemesh
      DATABASE_NAME: messagemesh
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REDIS_URL: redis://redis:6379
    ports:
      - "3007:3007"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./services/group-chat-service/src:/app/src

  # Media Service
  media-service:
    build:
      context: .
      dockerfile: services/media-service/Dockerfile
    container_name: messagemesh-media
    environment:
      PORT: 3006
      NODE_ENV: development
      DEBUG: 1
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: messagemesh
      DATABASE_PASSWORD: messagemesh
      DATABASE_NAME: messagemesh
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: 10485760
    ports:
      - "3006:3006"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./services/media-service/src:/app/src
      - media_uploads:/app/uploads

  # Notification Service
  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: messagemesh-notification
    environment:
      PORT: 3005
      NODE_ENV: development
      DEBUG: 1
      DATABASE_URL: postgresql://messagemesh:messagemesh@postgres:5432/messagemesh
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      JWT_SECRET: dev-jwt-secret
    ports:
      - "3005:3005"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mailhog:
        condition: service_started
    volumes:
      - ./services/notification-service/src:/app/src

  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: messagemesh-gateway
    environment:
      PORT: 3000
      NODE_ENV: development
      DEBUG: 1
      AUTH_SERVICE_URL: http://auth-service:3001
      USER_SERVICE_URL: http://user-service:3002
      MESSAGE_SERVICE_URL: http://message-service:3003
      PRESENCE_SERVICE_URL: http://presence-service:3004
      NOTIFICATION_SERVICE_URL: http://notification-service:3005
      MEDIA_SERVICE_URL: http://media-service:3006
      GROUP_CHAT_SERVICE_URL: http://group-chat-service:3007
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      - redis
      - auth-service
      - user-service
      - message-service
      - presence-service
      - group-chat-service
      - media-service
      - notification-service
    volumes:
      - ./services/api-gateway/src:/app/src

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  media_uploads:
